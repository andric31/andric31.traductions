<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game+</title>
  <script src="/theme-init.js"></script>
  <link rel="icon" href="/favicon.png" />
  <link rel="stylesheet" href="/themes.css" />
  <link rel="stylesheet" href="/game+/gameplus.css" />
</head>
<body class="mode-gameplus">
  <div class="gp-page">
    <header class="gp-topbar">
      <div class="gp-top-left">
        <div class="gp-kicker">✨✨ Section privée</div>
        <div class="gp-brand" aria-label="Game+"><span>✨✨</span> Game+</div>
      </div>
      <a class="gp-back" href="/">← Viewer</a>
    </header>

    <section class="gp-hero">
      <div>
        <h1>Game+</h1>
        <p>Jeux exclusifs disponibles uniquement pour les comptes connectés.</p>
      </div>
      <div class="gp-hero-card" id="miniStats" style="display:none;"></div>
    </section>

    <section class="gp-panel" id="toolbar" style="display:none;">
      <input id="searchInput" class="gp-search" type="search" placeholder="Rechercher un jeu, auteur, tag…" autocomplete="off">
      <select id="engineSelect" class="gp-select" aria-label="Filtrer par moteur">
        <option value="all">Tous les moteurs</option>
      </select>
      <select id="sortSelect" class="gp-select" aria-label="Tri">
        <option value="title">Titre A-Z</option>
        <option value="date-desc" selected>Date récente</option>
        <option value="date-asc">Date ancienne</option>
      </select>
    </section>

    <div class="gp-state" id="stateBox">Chargement de Game+…</div>
    <main class="gp-list" id="grid" aria-live="polite"></main>

    <a href="/connexion/" class="gp-login" id="loginBtn" style="display:none;">Se connecter</a>
  </div>

  <script src="/game+/gameplus.js"></script>
</body>
</html>
