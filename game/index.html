<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jeu</title>

  <!-- ✅ Applique le même thème que le viewer (localStorage.viewerTheme) -->
  <script>
  (function(){
    try{
      const t = (localStorage.getItem("viewerTheme") || "auto").trim() || "auto";
      const root = document.documentElement; // <html>
      root.removeAttribute("data-theme");
      if (t !== "auto") root.setAttribute("data-theme", t);
    }catch{}
  })();
  </script>

  <link rel="icon" href="/favicon.png" />
  <link rel="stylesheet" href="../viewer.css" />
  <link rel="stylesheet" href="../themes.css" />
  <link rel="stylesheet" href="./game.css" />
</head>

<body class="mode-game">
  <div class="wrap">
    <div class="cardPreview" id="card" aria-live="polite">
      <div class="cardInner">

        <div class="headRow">
          <button type="button" class="hamburger-btn" id="hamburgerBtn" aria-label="Ouvrir le menu" aria-haspopup="menu" aria-expanded="false">
            <span class="ham-lines" aria-hidden="true"><span></span><span></span><span></span></span>
          </button>

          <button class="btnLike like-btn" id="btnLike" type="button" aria-label="J’aime">🤍</button>

          <div class="badgesRow" id="badges"></div>
        </div>

        <div class="majState" id="majState" style="display:none;"></div>

        <h1 class="title" id="title">Chargement…</h1>

        <div class="coverWrap" id="coverWrap">
          <img id="cover" class="cover is-placeholder" alt="" referrerpolicy="no-referrer">
          <button type="button" class="coverZoomBtn" id="coverZoomBtn" aria-label="Agrandir l’image" title="Agrandir l’image" style="display:none;">⛶</button>
          <button type="button" class="coverNavBtn prev" id="coverPrevBtn" aria-label="Image précédente" title="Image précédente" style="display:none;"></button>
          <button type="button" class="coverNavBtn next" id="coverNextBtn" aria-label="Image suivante" title="Image suivante" style="display:none;">›</button>
          <div class="coverCounter" id="coverCounter" style="display:none;">1 / 1</div>
        </div>

        <div class="lightboxOverlay hidden" id="lightboxOverlay" aria-hidden="true">
          <button type="button" class="lightboxClose" id="lightboxClose" aria-label="Fermer">✕</button>
          <button type="button" class="lightboxNav prev" id="lightboxPrev" aria-label="Image précédente"></button>
          <div class="lightboxStage">
            <img id="lightboxImage" class="lightboxImage" alt="Image en grand" referrerpolicy="no-referrer">
            <div class="lightboxCounter" id="lightboxCounter">1 / 1</div>
          </div>
          <button type="button" class="lightboxNav next" id="lightboxNext" aria-label="Image suivante">›</button>
        </div>

        <div id="videoBox" class="infoBlock" style="display:none;">
          <h3>📺 Vidéo</h3>
          <iframe id="videoFrame"
            style="width:100%; aspect-ratio:16/9; border-radius:12px; border:1px solid var(--border);"
            loading="lazy"
            allowfullscreen>
          </iframe>
        </div>

        <div id="mainInfoBox" class="infoBlock" style="display:none;">
          <div class="tagsRow" id="tags"></div>

          <div id="descInnerBox" class="descInnerBox" style="display:none;">
            <div id="descriptionText" class="infoText"></div>
          </div>
        </div>

        <!-- ✅ BOUTONS : juste AU-DESSUS des étoiles -->
        <div class="btnRow">
          <a class="btnLike" id="btnDiscord" target="_blank" rel="noopener" style="display:none;">💬 Discord</a>
          <a class="btnLike" id="btnF95" target="_blank" rel="noopener" style="display:none;">F95Zone</a>
        </div>

        <div class="btnMainRow">
          <a class="btnLike btnMega" id="btnMega" target="_blank" rel="noopener" style="display:none;">📥 Télécharger la traduction · MEGA</a>
          <!-- translationsExtra injecté ici -->
        </div>

        <div id="archiveBox" style="display:none; margin-top:12px; justify-content:center;">
          <a id="archiveLink" class="btnLike" target="_blank" rel="noopener" style="justify-content:center;">
            📦 Archives de la traduction
          </a>
        </div>

        <!-- ✅ ℹ️ Informations AU-DESSUS des étoiles -->
        <div id="notesBox" class="infoBlock" style="display:none;">
          <h3>ℹ️ Informations</h3>
          <div id="notesText" class="infoTextMuted"></div>
        </div>

        <!-- ⭐ Notation -->
        <div id="ratingBox" class="infoBlock" style="text-align:center;">
          <div style="color:var(--muted); font-size:12px; margin-bottom:6px;">
            Note de la traduction :
            <strong id="ratingAvg">—</strong>
            (<span id="ratingCount">0</span> votes)
          </div>

          <div id="ratingChoices" style="display:flex; justify-content:center; gap:8px;"></div>
          <div id="ratingMsg" style="margin-top:6px; color:var(--muted); font-size:12px;"></div>
        </div>

      </div>
    </div>

    <div class="statsOut infoBlock" id="statsOut" style="display:none;">
      <div class="statsLine">
        <span class="statsItem" id="statTranslationWrap" title="Date de traduction inconnue">⏱️ Mise à jour : <strong id="statTranslationTime">—</strong></span>
        <span class="statsItem">👁️ Vues : <strong id="statViews">0</strong></span>
        <span class="statsItem">📥 Téléchargements : <strong id="statMegaClicks">0</strong></span>
        <span class="statsItem">❤️ J’aime : <strong id="statLikes">0</strong></span>
        <span class="statsItem" id="statRatingWrap" title="Note moyenne de la traduction">⭐ Note : <strong id="statRating">—</strong></span>
      </div>
      <div class="statsLine statsLineSub">
        <span class="statsItem" id="statAddedWrap" title="Date d’ajout inconnue">📅 Ajouté le <strong id="statAddedDate">—</strong></span>
      </div>
    </div>

    <div class="err" id="errBox"></div>
  </div>

  <script>
    (function(){
      const msg = document.getElementById("ratingMsg");
      if (!msg) return;

      const flash = () => {
        msg.classList.remove("msgFade");
        void msg.offsetWidth;
        msg.classList.add("msgFade");
      };

      const obs = new MutationObserver(() => flash());
      obs.observe(msg, { childList: true, characterData: true, subtree: true });

      if ((msg.textContent || "").trim()) flash();
    })();
  </script>

  <!-- ✅ Si le thème change dans un autre onglet (viewer), la page jeu suit -->
  <script>
  window.addEventListener("storage", (e) => {
    if (e.key !== "viewerTheme") return;
    try{
      const t = (localStorage.getItem("viewerTheme") || "auto").trim() || "auto";
      const root = document.documentElement;
      root.removeAttribute("data-theme");
      if (t !== "auto") root.setAttribute("data-theme", t);
    }catch{}
  });
  </script>

  <script src="../viewer.menu.js"></script>
  <script src="../viewer.menu.about.js"></script>
  <script src="../viewer.menu.extension.js"></script>
  <script src="./game.js"></script>

</body>
</html>
