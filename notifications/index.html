<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <title>Notifications</title>
  <link rel="icon" href="/favicon.png" />
  <link rel="stylesheet" href="/viewer.css" />
  <link rel="stylesheet" href="/themes.css" />
  <style>
    .notif-page{max-width:980px;margin:28px auto;padding:0 16px 28px}
    .notif-page h1{margin:0 0 18px;font-size:clamp(1.8rem,2.8vw,2.4rem)}
    .notif-page-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}
    .notif-back{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--fg);text-decoration:none;font-weight:700}
    .notif-list{display:grid;gap:14px}
    .notif-item{display:grid;grid-template-columns:56px 1fr;gap:14px;padding:16px;border:1px solid var(--border);border-radius:18px;background:color-mix(in srgb,var(--card) 92%, transparent);box-shadow:0 12px 28px rgba(0,0,0,.18)}
    .notif-item.new{border-color:color-mix(in srgb, #4da3ff 55%, var(--border));box-shadow:0 0 0 1px color-mix(in srgb, #4da3ff 22%, transparent),0 12px 28px rgba(0,0,0,.18)}
    .notif-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:var(--btn);color:var(--fg)}
    .notif-icon svg{width:24px;height:24px;display:block;stroke:currentColor;fill:none}
    .notif-body{min-width:0}
    .notif-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
    .notif-title{font-size:1.06rem;font-weight:800;color:var(--title)}
    .notif-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;font-size:.78rem;font-weight:800;background:color-mix(in srgb, #4da3ff 14%, transparent);color:#79b8ff;border:1px solid color-mix(in srgb, #4da3ff 35%, transparent)}
    .notif-text{color:var(--fg);line-height:1.5;margin:0 0 8px}
    .notif-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.95rem}
    .notif-empty,.notif-error{padding:18px;border:1px dashed var(--border);border-radius:16px;background:var(--soft-04);color:var(--muted)}
  </style>
</head>
<body>
  <main class="notif-page">
    <div class="notif-page-top">
      <h1>Notifications</h1>
      <a class="notif-back" href="/">← Retour à l’accueil</a>
    </div>
    <div id="notifStatus" class="notif-empty">Chargement…</div>
    <section id="notifList" class="notif-list hidden" aria-label="Liste des notifications"></section>
  </main>
  <script src="/notifications/notifications.js"></script>
</body>
</html>
