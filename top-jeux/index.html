<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Top jeux de la communauté</title>
  <link rel="icon" href="/favicon.png">
  <link rel="stylesheet" href="/viewer.css">
  <link rel="stylesheet" href="/themes.css">
  <link rel="stylesheet" href="/top-jeux/top-jeux.css">
  <script src="/theme-init.js"></script>
</head>
<body class="community-top-page">
  <main class="community-top-shell">
    <header class="community-top-hero">
      <div>
        <span class="community-top-kicker">CLASSEMENTS DES MEMBRES</span>
        <h1>🏆 Top jeux de la communauté</h1>
        <p>Découvre les jeux préférés publiés volontairement par les membres connectés. Les dernières publications apparaissent en premier.</p>
      </div>
      <div class="community-top-hero-actions">
        <a class="community-top-btn" href="/">Retour au viewer</a>
        <a class="community-top-btn primary" href="/compte/mes-jeux.html">Publier mon top</a>
      </div>
    </header>

    <section class="community-top-summary" aria-label="Résumé">
      <div><strong id="topMemberCount">—</strong><span>tops publiés</span></div>
      <div><strong id="topGameCount">—</strong><span>jeux classés</span></div>
      <div><strong>5</strong><span>jeux par top</span></div>
    </section>

    <div class="community-top-status" id="topStatus">Chargement des tops…</div>
    <section class="community-top-grid" id="topGrid" aria-live="polite"></section>
  </main>
  <script src="/top-jeux/top-jeux.js"></script>
</body>
</html>
